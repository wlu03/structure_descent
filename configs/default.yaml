# PO-LEU default config (redesign.md Appendix B).
# Any deviation from these values must be recorded in NOTES.md.

seed: 0

model:
  M: 5                 # number of attribute heads (§5.2)
  K: 3                 # outcomes per alternative (§3)
  J: 10                # alternatives per choice set
  d_e: 768             # sentence-encoder dim (§4.1)
  p: 26                # effective z_d dim after one-hot encoding (§2.1)

  attribute_heads:
    hidden: 128        # §5.1
    activation: relu
  weight_net:
    hidden: 32         # §6.1
    normalization: softmax   # §6.2; ablation: softplus
  salience_net:
    hidden: 64         # §7.1
  temperature: 1.0     # §8.2 (not trained)
  person_dependent_heads: false  # §5.3
  uniform_salience: false        # §7.3

  # Strategy B: Sifringer feature-partition tabular residual.
  # When enabled, PO-LEU adds a small linear branch
  #   V_total = V + Σ_f β_f · standardize(x_tab_f)
  # giving the model direct access to numeric per-alternative columns
  # the frozen sentence-transformer encoder cannot see (raw price etc.).
  # ``β`` is zero-initialised, so enabling this knob alone does NOT
  # change initial logits — bit-identical to baseline at step 0.
  # ``popularity_rank`` is intentionally absent: the encoder text
  # already renders a popularity band, so adding it numerically
  # creates an identifiability fight (see src/model/po_leu.py).
  tabular_residual:
    enabled: true
    features:
      - price
      - log1p_price
      - price_rank
      # Dense numeric popularity (raw count from train) — coarse-band
      # popularity_rank string the LLM prompt uses is too coarse for
      # the residual; popularity_count is the per-ASIN integer the
      # encoder cannot recover from the band label.
      - popularity_count
      - log1p_popularity_count
      # Graded customer-ASIN repeat-purchase signal. is_repeat is the
      # binary ("has the customer ever bought this ASIN in train"),
      # log1p_purchase_count is the graded version.
      - is_repeat
      - log1p_purchase_count

data:
  split: temporal      # reuses v2.0 split artifact
  choice_set_size: 10  # J
  # Hard-negative sampling: replace some random negatives with
  # same-category + price-similar ASINs (rate of n_negatives, price within
  # ±band of chosen). Forces PO-LEU to discriminate on subtle signals
  # instead of obvious distractors. 0.0 = legacy half-cat / half-random.
  hard_negative_rate: 0.3
  hard_negative_price_band: 0.5
  # Customer-aggregate c_d enrichment: adds top_brand / top_categories /
  # avg_price / repeat_rate clauses to the customer context string the
  # LLM sees during outcome generation. Train-only aggregates (no
  # val/test leakage). false = legacy c_d.
  enrich_customer_context: true

outcomes:
  K: 3
  generator:
    model_id: "stub"                 # default to hermetic stub; real client configured in configs/real.yaml
    temperature: 0.8                 # §3.3
    top_p: 0.95
    max_tokens: 180
    prompt_version: "v1"
  encoder:
    model_id: "sentence-transformers/all-mpnet-base-v2"   # §4.1
    pooling: mean
    l2_normalize: true
    max_length: 64
  diversity_filter:
    enabled: true
    cos_sim_threshold: 0.9
    max_retries: 2
  cache:
    outcomes_path: "outcomes_cache/outcomes.sqlite"
    embeddings_path: "embeddings_cache/embeddings.sqlite"

# Opt-in K=5 anchored prompts (one outcome per M=5 head axis). Requires cache regen via scripts/run_dataset.py --prompt-version-cascade v3_anchored v2.
outcomes_anchored:
  enabled: false
  K: 5
  prompt_version: "v3_anchored"

train:
  batch_size: 128            # §9.3
  lr: 1.0e-3
  lr_min: 1.0e-4
  optimizer: adam
  beta1: 0.9
  beta2: 0.999
  max_epochs: 30
  early_stopping_patience: 9999  # effectively disabled (must exceed max_epochs); patience-counter telemetry still updates so logs reflect val-NLL plateaus, but the loop runs the full epoch budget.
  grad_clip: 1.0
  seeds: [0, 1, 2]           # 3 seeds reported

regularizers:
  weight_l2: 1.0e-4          # §9.2 λ_wL2
  salience_entropy: 1.0e-3   # §9.2 λ_entropy (encourages spread)
  monotonicity:              # §9.2 λ_mono (optional)
    enabled: true            # Amazon purchase events: domain prior holds (§9.2). Override per-dataset when inappropriate.
    lambda: 1.0e-3
    price_key: "price"
  diversity: 1.0e-4          # §9.2 λ_div
  head_variance: 1.0e-2      # anti-dead-head pull on per-head score variance (subtract to maximize). 0.0 = legacy.

eval:
  top_k_list: [1, 5]
  strata:
    - category
    - repeat_or_novel
    - activity_tertile
    - time_of_day
    - dominant_attribute

subsample:
  enabled: true              # Appendix C; customer subsampling
  method: random             # 'random' (uniform, ω=1, representative) or 'leverage' (Appendix C diversity)
  n_customers: 100
  n_pca_components: 20       # leverage-only; ignored when method=random
  min_per_category_cluster: 2  # leverage-only; ignored when method=random
  seed: 42

paths:
  outcomes_cache: "outcomes_cache/"
  embeddings_cache: "embeddings_cache/"
  checkpoints: "checkpoints/"
  reports: "reports/"
