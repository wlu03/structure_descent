# PO-LEU ablation A5: person-dependent attribute heads.
# Standalone file — copy of configs/default.yaml with targeted overrides
# per redesign.md §5.3 / §11 A5. Do not edit default.yaml.
#
# NOTE: This ablation is CONFIG-ONLY at this stage. Wave 5's
# src/model/attribute_heads.py implements person-independent heads per
# §5.3 default; no training code path consumes this flag yet. See
# NOTES.md "Wave 7 — interpretability + ablation configs" entry.

ablation:
  id: "A5"
  description: "Person-dependent attribute heads u_m(e_k, z_d); flag only, code path not implemented (redesign.md §11 A5)."

seed: 0

model:
  M: 5
  K: 3
  J: 10
  d_e: 768
  p: 26

  attribute_heads:
    hidden: 128
    activation: relu
    person_dependent: true   # §11 A5 flag — not implemented in this build
  weight_net:
    hidden: 32
    normalization: softmax
  salience_net:
    hidden: 64
  temperature: 1.0
  person_dependent_heads: true   # top-level mirror for consumers that read this key
  uniform_salience: false

data:
  split: temporal
  choice_set_size: 10

outcomes:
  K: 3
  generator:
    model_id: "stub"
    temperature: 0.8
    top_p: 0.95
    max_tokens: 180
    prompt_version: "v1"
  encoder:
    model_id: "sentence-transformers/all-mpnet-base-v2"
    pooling: mean
    l2_normalize: true
    max_length: 64
  diversity_filter:
    enabled: true
    cos_sim_threshold: 0.9
    max_retries: 2
  cache:
    outcomes_path: "outcomes_cache/outcomes.sqlite"
    embeddings_path: "embeddings_cache/embeddings.sqlite"

train:
  batch_size: 128
  lr: 1.0e-3
  lr_min: 1.0e-4
  optimizer: adam
  beta1: 0.9
  beta2: 0.999
  max_epochs: 30
  early_stopping_patience: 5
  grad_clip: 1.0
  seeds: [0, 1, 2]

regularizers:
  weight_l2: 1.0e-4
  salience_entropy: 1.0e-3
  monotonicity:
    enabled: false
    lambda: 1.0e-3
    price_key: "price"
  diversity: 1.0e-4

eval:
  top_k_list: [1, 5]
  strata:
    - category
    - repeat_or_novel
    - activity_tertile
    - time_of_day
    - dominant_attribute

subsample:
  enabled: false
  n_customers: 500
  n_pca_components: 20
  min_per_category_cluster: 2
  seed: 42

paths:
  outcomes_cache: "outcomes_cache/"
  embeddings_cache: "embeddings_cache/"
  checkpoints: "checkpoints/"
  reports: "reports/"
